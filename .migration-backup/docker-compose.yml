version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptoxchange_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptoxchange
      POSTGRES_USER: cryptouser
      POSTGRES_PASSWORD: cryptopassword123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cryptouser -d cryptoxchange']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cryptoxchange_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptoxchange_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://cryptouser:cryptopassword123@postgres:5432/cryptoxchange
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    ports:
      - '4000:4000'
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cryptoxchange_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
