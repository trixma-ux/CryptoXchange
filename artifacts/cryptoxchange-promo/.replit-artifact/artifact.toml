kind = "video"
previewPath = "/cryptoxchange-promo/"
title = "CryptoXchange Promo Video"
version = "1.0.0"
id = "artifacts/cryptoxchange-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cryptoxchange-promo/" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/cryptoxchange-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cryptoxchange-promo", "run", "build" ]
publicDir = "artifacts/cryptoxchange-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3001"
BASE_PATH = "/cryptoxchange-promo/"
