kind = "mobile"
previewPath = "/cryptoxchange-mobile/"
title = "CryptoXchange Mobile"
version = "1.0.0"
id = "artifacts/cryptoxchange-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/cryptoxchange-mobile/" ]
localPort = 20379

[services.development]
run = "pnpm --filter @workspace/cryptoxchange-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cryptoxchange-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cryptoxchange-mobile", "run", "serve" ]

[services.env]
PORT = "20379"
BASE_PATH = "/cryptoxchange-mobile/"
